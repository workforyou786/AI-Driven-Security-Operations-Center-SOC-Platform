packages:
  "recharts": "Required for SOC dashboard analytics charts (timeline, distribution)"
  "date-fns": "Required for precise timestamp formatting in security logs and alerts"
  "clsx": "Utility for constructing className strings conditionally"
  "tailwind-merge": "Utility for merging tailwind classes without style conflicts"
  "@radix-ui/react-dialog": "Accessible dialog component for attack simulation and incident creation modals"
  "@radix-ui/react-slot": "Required for polymorphic components in the UI library"
  "@radix-ui/react-toast": "Required for system notifications and alerts"

images:
  - path: "artifacts/soc-dashboard/public/images/logo.png"
    description: "Minimalist, sleek cybersecurity shield logo in glowing neon cyan and dark navy, geometric, flat vector style, transparent background"
    aspect_ratio: "1:1"

notes:
  - "Assuming @workspace/api-client-react is correctly configured and exports all React Query hooks generated by Orval."
  - "Using JetBrains Mono for a terminal-inspired, data-dense cybersecurity aesthetic."
  - "The UI requires dark mode globally to fit the SOC context."
